name: CI/CD – Build, Validate & Deploy

on:
  push:
    branches: ["main", "claude/beautiful-ritchie-5zfofc"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Es darf immer nur ein Deployment gleichzeitig laufen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------- CI: Fragen-Datenbank prüfen ----------
  validate:
    name: Validate question bank
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dev dependencies
        run: npm ci

      - name: Validate question bank (structure + count)
        run: npm run validate

      - name: UI smoke test (jsdom)
        run: npm run uitest

  # ---------- CD: Auf GitHub Pages deployen ----------
  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (./public)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
